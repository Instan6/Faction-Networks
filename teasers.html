* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; color:#fff; overflow-x:hidden; position:relative; background:#0f0f0f; }

@keyframes gradientMove { 0% {background-position:0% 50%;} 50% {background-position:100% 50%;} 100% {background-position:0% 50%;} }
.glow-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at center, rgba(0,162,255,0.2), transparent 70%); z-index:-1; pointer-events:none; }
header { width:100%; padding:20px 40px; display:flex; justify-content:space-between; align-items:center; background: rgba(0,0,0,0.65); backdrop-filter: blur(10px); position:sticky; top:0; z-index:10; }

.navbar a:hover { color:white; }

        .hero h1 { font-size:48px; margin-bottom:15px; }
        .hero p { font-size:20px; margin-bottom:25px; }
.content { padding:60px; max-width:1400px; margin:0 auto; }
.teaser-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:25px; margin-top:50px; }
.teaser-card { background:#141414; border-radius:15px; overflow:hidden; box-shadow:0 0 25px rgba(0,0,0,0.45); transition:0.2s; }
.teaser-card:hover { transform:translateY(-5px); }
.teaser-card img { width:100%; height:180px; object-fit:cover; }
.teaser-content { padding:15px; }
.teaser-title { font-size:20px; font-weight:bold; margin-bottom:8px; }
.teaser-text { font-size:16px; color:#ccc; }
</style>
